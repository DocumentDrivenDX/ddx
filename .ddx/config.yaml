version: "1.0"
library:
    path: .ddx/plugins/ddx
    repository:
        url: https://github.com/easel/ddx-library
        branch: main
#
# bead_tracker.backend: axon
# bead_tracker:
#   backend: axon
#   axon:
#     endpoint: http://localhost:8080/graphql
#     subscription_endpoint: ws://localhost:8080/graphql
#     database: ddx-default
#     namespace: project-name
#     collection: ddx_beads
#     events_collection: ddx_bead_events
#     schema_version: 1
#     auth:
#       mode: localhost
#       tsnet:
#         hostname: ddx-project
#
# The live config schema currently uses `bead.backend`; this commented block
# documents the Axon backend selection and connection settings for operators.
update_check:
    enabled: true
    frequency: 24h
git:
    auto_commit: always
    commit_prefix: chore
    # Land-time independent verification gate (ddx-ec2d3c1b): a failing command
    # rejects the merge (restores the ref, post-land gate failed) so non-compiling
    # work — production OR tests, e.g. the ddx-c135246c regression — cannot land.
    # go vet compiles both; ~7s cached. Activated 2026-05-27.
    post_land_command:
        - sh
        - -c
        - 'export PATH=/home/linuxbrew/.linuxbrew/bin:/usr/bin:/bin:$PATH; cd cli && go vet ./...'
agent:
    endpoints:
        - type: lmstudio
          host: 100.70.199.113
          port: 1234
          api_key: lmstudio
        - type: omlx
          host: 100.70.199.113
          port: 1235
        - type: lmstudio
          host: 100.127.38.115
          port: 1234
          api_key: lmstudio
        - type: lmstudio
          host: 100.97.179.68
          port: 1234
          api_key: lmstudio
