version: "1.0"
library:
    path: .ddx/plugins/ddx
    repository:
        url: https://github.com/easel/ddx-library
        branch: main
update_check:
    enabled: true
    frequency: 24h
agent:
    harness: claude
    routing:
        profile_priority:
            - cheap
        default_harness: agent
        model_overrides:
            cheap: qwen/qwen3.6
            fast: kimi/k2.5
            smart: minimax/minimax-m2.7
