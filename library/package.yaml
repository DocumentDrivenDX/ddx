name: ddx
version: 0.4.7
description: DDx default library — prompts, personas, MCP server configs, environment templates, and skills
type: plugin
source: https://github.com/DocumentDrivenDX/ddx
api_version: "1"
keywords:
  - library
  - prompts
  - personas
  - mcp
  - default
  - skills
install:
  root:
    source: .
    # Legacy/local-overlay compatibility metadata only.
    # Built-in DDx resolves through the embedded default-plugin cache and
    # generated adapters, not a copied project payload tree.
    target: .ddx/plugins/ddx
  skills:
    - source: skills/
      target: .agents/skills/
    - source: skills/
      target: .claude/skills/
