# Location of all your GraphQL files
schema:
  - schema.graphql

# Location where the generated server code will be writen
exec:
  filename: ./internal/server/graphql/generated.go
  package: graphql

# Configuration for resolved generated by gqlgen
resolver:
  # Location where the resolver implementation will be writen
  filename: ./internal/server/graphql/resolver.go
  # Package name where resolver will be generated
  package: graphql

# Location of the models
model:
  filename: ./internal/server/graphql/models.go
  package: graphql
