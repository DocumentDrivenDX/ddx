		<script>
			(() => {
				if (window.__ddxCommandPaletteBridgeInstalled) return;
				window.__ddxCommandPaletteBridgeInstalled = true;

				window.addEventListener(
					'keydown',
					(event) => {
						if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k') {
							event.preventDefault();
							window.__ddxCommandPalettePendingOpen = true;
							window.dispatchEvent(new CustomEvent('ddx-command-palette-open'));
						}

						if (event.key === 'Escape') {
							window.dispatchEvent(new CustomEvent('ddx-command-palette-close'));
						}
					},
					{ capture: true }
				);
			})();
		</script>
