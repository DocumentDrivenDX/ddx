# ADR-022 step 5b: derived-view query. reportedWorkers exposes the
# worker_ingest in-memory view of trusted-peer-reported workers. Filtered
# client-side by the current project's root path (see +layout.ts).
query ReportedWorkersByProject {
	reportedWorkers {
		id
		project
		harness
		state
		lastEventAt
		mirrorFailuresCount
		hadDroppedBackfill
		currentBead
		currentAttempt
	}
}

query WorkersByProject($projectID: String!) {
	workersByProject(projectID: $projectID, first: 50) {
		edges {
			node {
				id
				kind
				state
				status
				harness
				model
				currentBead
				attempts
				successes
				failures
				startedAt
			}
			cursor
		}
		pageInfo {
			hasNextPage
			endCursor
		}
		totalCount
	}
}

query WorkerDetail($id: ID!) {
	worker(id: $id) {
		id
		kind
		state
		status
		harness
		model
		effort
		once
		pollInterval
		startedAt
		finishedAt
		currentBead
		lastError
		attempts
		successes
		failures
		currentAttempt {
			attemptId
			beadId
			phase
			startedAt
			elapsedMs
		}
		recentEvents {
			kind
			text
			name
			inputs
			output
		}
	}
}

query WorkerLog($workerID: ID!) {
	workerLog(workerID: $workerID) {
		stdout
		stderr
	}
}
